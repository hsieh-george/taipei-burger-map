<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>台北市漢堡店家排名地圖 | 電腦版</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        html, body { 
            height: 100%; 
            margin: 0; 
            padding: 0; 
            font-family: "Microsoft JhengHei", sans-serif;
        }
        * { box-sizing: border-box; }
        body { background: #1a1a1a; color: #fff; }

        .header { 
            padding: 15px;
            text-align: center; 
            background: #2d2d2d; 
        }
        .header h1 { font-size: 20px; margin: 0; }
        .header p { font-size: 12px; opacity: 0.8; margin: 5px 0 0 0; }

        #map { 
            height: calc(100vh - 80px);
            width: 100%; 
            z-index: 1;
        }

        /* 控制按鈕 */
        .toggle-btn, .toggle-legend-btn {
            position: fixed;
            background: #222;
            color: #fff;
            border: 2px solid #e63946;
            border-radius: 50%;
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 9999;
            bottom: 20px;
            font-size: 18px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }
        .toggle-btn { right: 20px; }
        .toggle-legend-btn { left: 20px; }
        .toggle-btn:hover, .toggle-legend-btn:hover {
            background: #e63946;
        }

        /* 圖例面板 */
        .legend {
            position: fixed;
            bottom: 80px;
            left: 20px;
            background: rgba(0,0,0,0.85);
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            z-index: 998;
            min-width: 240px;
            display: block;
        }
        .legend h4 { margin: 0 0 10px 0; font-size: 16px; }
        .legend-item {
            display: flex;
            align-items: center;
            margin: 6px 0;
        }
        .legend-color {
            width: 14px;
            height: 14px;
            margin-right: 8px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        /* 篩選面板 */
        .filter-panel {
            position: fixed;
            bottom: 80px;
            right: 20px;
            background: rgba(0,0,0,0.85);
            padding: 15px;
            border-radius: 8px;
            font-size: 14px;
            z-index: 999;
            min-width: 300px;
            display: block;
        }
        .filter-title { font-weight: bold; margin-bottom: 10px; font-size: 16px; }
        .rank-buttons {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px;
            margin-bottom: 12px;
        }
        .rank-btn {
            padding: 8px;
            border: none;
            border-radius: 4px;
            color: #fff;
            cursor: pointer;
            font-size: 14px;
            opacity: 0.8;
            transition: all 0.2s;
        }
        .rank-btn:hover, .rank-btn.active { opacity: 1; transform: scale(1.05); }
        .area-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 12px;
            max-height: 150px;
            overflow-y: auto;
            padding-right: 5px;
        }
        .area-btn {
            padding: 6px 8px;
            border: 1px solid #666;
            background: #333;
            color: #fff;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
        }
        .area-btn:hover, .area-btn.active { background: #e63946; border-color: #e63946; }
        .reset-btn {
            width: 100%;
            padding: 8px;
            border: none;
            border-radius: 4px;
            background: #577590;
            color: #fff;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }
        .reset-btn:hover { background: #43aa8b; }

        /* 彈窗樣式 */
        .leaflet-popup-content { color: #333; width: 220px !important; }
        .popup-title { font-weight: bold; font-size: 16px; margin-bottom: 6px; color: #e63946; }
        .popup-info { font-size: 14px; margin: 4px 0; }
    </style>
</head>
<body>
    <div class="header">
        <h1>台北市漢堡店家排名地圖</h1>
        <p>T0(敲級好吃)~T6(犬不爭食) 好吃等級 | 行政區篩選</p>
    </div>
    <div id="map"></div>

    <button class="toggle-btn" id="toggleFilterBtn">≡</button>
    <button class="toggle-legend-btn" id="toggleLegendBtn">ℹ️</button>

    <div class="legend" id="legendPanel">
        <h4>好吃等級 (常見連鎖店)</h4>
        <div class="legend-item"><div class="legend-color" style="background: #e63946;"></div>T0 (Shake Shack)</div>
        <div class="legend-item"><div class="legend-color" style="background: #f77f00;"></div>T1 (Five Guys)</div>
        <div class="legend-item"><div class="legend-color" style="background: #fcbf49;"></div>T2 (Subway)</div>
        <div class="legend-item"><div class="legend-color" style="background: #e9f542;"></div>T3 (貳樓)</div>
        <div class="legend-item"><div class="legend-color" style="background: #43aa8b;"></div>T4 (漢堡王)</div>
        <div class="legend-item"><div class="legend-color" style="background: #577590;"></div>T5 (麥當勞)</div>
        <div class="legend-item"><div class="legend-color" style="background: #277da1;"></div>T6 (摩斯漢堡)</div>
    </div>

    <div class="filter-panel" id="filterPanel">
        <div class="filter-title">好吃等級</div>
        <div class="rank-buttons">
            <button class="rank-btn" style="background: #e63946;" data-rank="T0">T0 (Shake Shack)</button>
            <button class="rank-btn" style="background: #f77f00;" data-rank="T1">T1 (Five Guys)</button>
            <button class="rank-btn" style="background: #fcbf49;" data-rank="T2">T2 (Subway)</button>
            <button class="rank-btn" style="background: #e9f542;" data-rank="T3">T3 (貳樓)</button>
            <button class="rank-btn" style="background: #43aa8b;" data-rank="T4">T4 (漢堡王)</button>
            <button class="rank-btn" style="background: #577590;" data-rank="T5">T5 (麥當勞)</button>
            <button class="rank-btn" style="background: #277da1;" data-rank="T6">T6 (摩斯漢堡)</button>
        </div>
        <div class="filter-title">行政區</div>
        <div class="area-buttons">
            <button class="area-btn" data-area="信義區">信義區</button>
            <button class="area-btn" data-area="大安區">大安區</button>
            <button class="area-btn" data-area="松山區">松山區</button>
            <button class="area-btn" data-area="中山區">中山區</button>
            <button class="area-btn" data-area="南港區">南港區</button>
            <button class="area-btn" data-area="內湖區">內湖區</button>
            <button class="area-btn" data-area="士林區">士林區</button>
            <button class="area-btn" data-area="北投區">北投區</button>
            <button class="area-btn" data-area="中正區">中正區</button>
            <button class="area-btn" data-area="萬華區">萬華區</button>
            <button class="area-btn" data-area="大同區">大同區</button>
            <button class="area-btn" data-area="文山區">文山區</button>
        </div>
        <button class="reset-btn" id="resetFilter">重置篩選</button>
    </div>

    <script>
        // 初始化地圖
        const map = L.map('map').setView([25.0478, 121.5319], 13);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap contributors &copy; CARTO',
            maxZoom: 18
        }).addTo(map);

        // 等級顏色映射
        const rankColorMap = {
            T0: '#e63946', T1: '#f77f00', T2: '#fcbf49',
            T3: '#e9f542', T4: '#43aa8b', T5: '#577590', T6: '#277da1'
        };

        // 測試數據（如果有data.js可替換）
        const testData = [
            { name: 'Shake Shack (信義區)', rank: 'T0', area: '信義區', lat: 25.0375, lng: 121.5646, meat: '安格斯牛肉', price: 'NT$180-' },
            { name: 'Five Guys (大安區)', rank: 'T1', area: '大安區', lat: 25.0458, lng: 121.5219, meat: '牛肉', price: 'NT$220-' },
            { name: '漢堡王 (中山區)', rank: 'T4', area: '中山區', lat: 25.0602, lng: 121.5139, meat: '牛肉', price: 'NT$99-' },
            { name: '麥當勞 (西門町)', rank: 'T5', area: '萬華區', lat: 25.0471, lng: 121.5039, meat: '牛肉', price: 'NT$79-' },
            { name: '摩斯漢堡 (士林)', rank: 'T6', area: '士林區', lat: 25.0878, lng: 121.5136, meat: '雞肉', price: 'NT$89-' }
        ];

        // 添加地圖標記
        let allMarkers = [];
        function addMarkers(data) {
            // 清空舊標記
            allMarkers.forEach(marker => map.removeLayer(marker));
            allMarkers = [];

            // 添加新標記
            data.forEach(shop => {
                const marker = L.circleMarker([shop.lat, shop.lng], {
                    radius: 9,
                    fillColor: rankColorMap[shop.rank] || '#6c757d',
                    color: "#fff",
                    weight: 1,
                    fillOpacity: 0.9
                }).addTo(map);

                // 彈窗內容
                marker.bindPopup(`
                    <div class="popup-title">${shop.name}</div>
                    <div class="popup-info">好吃等級：${shop.rank}</div>
                    <div class="popup-info">地區：${shop.area}</div>
                    <div class="popup-info">肉品：${shop.meat}</div>
                    <div class="popup-info">價格：${shop.price}</div>
                `);

                allMarkers.push(marker);
            });
        }

        // 初始化標記
        addMarkers(testData);

        // 面板顯示/隱藏切換
        const filterBtn = document.getElementById('toggleFilterBtn');
        const legendBtn = document.getElementById('toggleLegendBtn');
        const filterPanel = document.getElementById('filterPanel');
        const legendPanel = document.getElementById('legendPanel');

        filterBtn.addEventListener('click', () => {
            filterPanel.style.display = filterPanel.style.display === 'none' ? 'block' : 'none';
        });
        legendBtn.addEventListener('click', () => {
            legendPanel.style.display = legendPanel.style.display === 'none' ? 'block' : 'none';
        });

        // 篩選功能
        let currentRank = null;
        let currentArea = null;

        // 等級篩選
        document.querySelectorAll('.rank-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                // 取消其他按鈕激活狀態
                document.querySelectorAll('.rank-btn').forEach(b => b.classList.remove('active'));
                // 切換當前按鈕狀態
                if (currentRank === btn.dataset.rank) {
                    currentRank = null;
                    btn.classList.remove('active');
                } else {
                    currentRank = btn.dataset.rank;
                    btn.classList.add('active');
                }
                filterMarkers();
            });
        });

        // 行政區篩選
        document.querySelectorAll('.area-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                // 取消其他按鈕激活狀態
                document.querySelectorAll('.area-btn').forEach(b => b.classList.remove('active'));
                // 切換當前按鈕狀態
                if (currentArea === btn.dataset.area) {
                    currentArea = null;
                    btn.classList.remove('active');
                } else {
                    currentArea = btn.dataset.area;
                    btn.classList.add('active');
                }
                filterMarkers();
            });
        });

        // 重置篩選
        document.getElementById('resetFilter').addEventListener('click', () => {
            currentRank = null;
            currentArea = null;
            document.querySelectorAll('.rank-btn, .area-btn').forEach(btn => btn.classList.remove('active'));
            addMarkers(testData); // 還原所有標記
        });

        // 篩選標記邏輯
        function filterMarkers() {
            const filteredData = testData.filter(shop => {
                const rankMatch = currentRank ? shop.rank === currentRank : true;
                const areaMatch = currentArea ? shop.area === currentArea : true;
                return rankMatch && areaMatch;
            });
            addMarkers(filteredData);
        }
    </script>
</body>
</html>
