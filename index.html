<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>台北市漢堡店家排名地圖 | T0-T6 等級</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        /* 核心修復：html/body 設置高度，確保地圖高度計算正確 */
        html, body { 
            height: 100%; 
            margin: 0; 
            padding: 0; 
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Microsoft JhengHei", sans-serif; }
        body { background: #1a1a1a; color: #fff; }
        .header { 
            padding: 15px; 
            text-align: center; 
            background: #2d2d2d; 
            height: 80px; 
            box-sizing: border-box;
        }
        .header h1 { font-size: 20px; margin-bottom: 5px; }
        .header p { font-size: 14px; opacity: 0.8; }
        #map { 
            height: calc(100vh - 80px); 
            width: 100%; 
            position: relative; 
            z-index: 1; 
            min-height: 500px; 
        }

        /* 書籤式折疊按鈕：所有尺寸都顯示（核心修改） */
        .toggle-btn {
            position: fixed;
            bottom: 20px; 
            background: rgba(0,0,0,0.95);
            color: #fff;
            border: 2px solid #e63946;
            border-radius: 50%; 
            padding: 0;
            font-size: 18px;
            cursor: pointer;
            z-index: 99999;
            transition: all 0.2s;
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
            top: auto;
            transform: none;
        }
        /* 左下角書籤（控制圖例） */
        .toggle-legend {
            left: 20px; 
        }
        /* 右下角書籤（控制篩選） */
        .toggle-filter {
            right: 20px; 
        }
        .toggle-btn:hover {
            background: #e63946;
            border-color: #fff;
        }

        /* 圖例面板：所有尺寸都使用滑入式（核心修改） */
        .legend {
            position: fixed;
            top: 50%;
            left: 0;
            transform: translateY(-50%);
            background: rgba(0,0,0,0.9);
            padding: 15px;
            border-radius: 0 10px 10px 0;
            font-size: 13px;
            z-index: 99998;
            min-width: 240px;
            transition: transform 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            transform: translate(-100%, -50%); /* 預設隱藏在左側 */
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        .legend.show {
            transform: translate(0, -50%); /* 展開：滑入螢幕 */
        }
        .legend h4 { margin-bottom: 10px; font-size: 15px; color: #e63946; }
        .legend-item { display: flex; align-items: center; margin: 6px 0; }
        .legend-color { width: 14px; height: 14px; margin-right: 8px; border-radius: 50%; }

        /* 篩選面板：所有尺寸都使用滑入式（核心修改） */
        .filter-panel {
            position: fixed;
            top: 50%;
            right: 0;
            transform: translateY(-50%);
            background: rgba(0,0,0,0.9);
            padding: 15px;
            border-radius: 10px 0 0 10px;
            font-size: 13px;
            z-index: 99998;
            min-width: 280px;
            transition: transform 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            transform: translate(100%, -50%); /* 預設隱藏在右側 */
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        .filter-panel.show {
            transform: translate(0, -50%); /* 展開：滑入螢幕 */
        }
        .filter-title { font-size: 15px; font-weight: bold; margin-bottom: 10px; color: #e63946; }
        .rank-buttons { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin-bottom: 12px; }
        .rank-btn {
            padding: 7px 10px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            color: #fff;
            opacity: 0.85;
            transition: all 0.2s;
            white-space: nowrap;
        }
        .rank-btn.active { opacity: 1; transform: scale(1.05); box-shadow: 0 0 8px rgba(230, 57, 70, 0.5); }
        .area-buttons { 
            display: flex; 
            flex-wrap: wrap; 
            gap: 5px; 
            max-height: 120px;
            overflow-y: auto;
            padding-right: 6px;
            margin-bottom: 10px;
        }
        .area-btn {
            padding: 5px 8px;
            border: 1px solid #666;
            background: #333;
            color: #fff;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            white-space: nowrap;
            transition: all 0.2s;
        }
        .area-btn.active { background: #e63946; border-color: #fff; }
        .reset-btn {
            width: 100%;
            padding: 8px;
            border: none;
            border-radius: 6px;
            background: #577590;
            color: #fff;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
        }
        .reset-btn:hover { background: #43aa8b; }

        /* 彈窗樣式優化 */
        .leaflet-popup-content { color: #333; width: 220px !important; }
        .popup-title { font-weight: bold; font-size: 17px; margin-bottom: 7px; color: #e63946; }
        .popup-info { font-size: 15px; margin: 4px 0; }

        /* 電腦版優化：僅調整面板尺寸，保留收縮功能（核心修改） */
        @media (min-width: 769px) {
            /* 保留按鈕，不隱藏 */
            .toggle-btn { 
                display: flex; 
                /* 大屏下按鈕稍微放大，更易點擊 */
                width: 50px;
                height: 50px;
                font-size: 20px;
            }
            /* 大屏下面板寬度適當增加，內容更舒適 */
            .legend { min-width: 260px; }
            .filter-panel { min-width: 300px; }
        }

        /* 小屏電腦優化 */
        @media (max-width: 1024px) and (min-width: 769px) {
            .legend { min-width: 240px; }
            .filter-panel { min-width: 280px; }
            .toggle-btn { width: 45px; height: 45px; font-size: 18px; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>台北市漢堡店家排名地圖</h1>
        <p>T0(敲級好吃)~T6(犬不爭食) 好吃等級 | 行政區篩選</p>
    </div>
    <div id="map"></div>

    <!-- 左下角書籤按鈕（控制圖例） -->
    <button class="toggle-btn toggle-legend" id="toggleLegend">ℹ️</button>
    <!-- 圖例面板（書籤式） -->
    <div class="legend" id="legendPanel">
        <h4>評級 </h4>
        <div class="legend-item"><div class="legend-color" style="background: #e63946;"></div>T0 (敲級好吃)</div>
        <div class="legend-item"><div class="legend-color" style="background: #f77f00;"></div>T1 (滿好吃的)</div>
        <div class="legend-item"><div class="legend-color" style="background: #fcbf49;"></div>T2 (普通好吃)</div>
        <div class="legend-item"><div class="legend-color" style="background: #e9f542;"></div>T3 (雞肋勘吃)</div>
        <div class="legend-item"><div class="legend-color" style="background: #43aa8b;"></div>T4 (將就果腹)</div>
        <div class="legend-item"><div class="legend-color" style="background: #577590;"></div>T5 (難以吞嚥)</div>
        <div class="legend-item"><div class="legend-color" style="background: #277da1;"></div>T6 (犬不爭食)</div>
    </div>

    <!-- 右下角書籤按鈕（控制篩選） -->
    <button class="toggle-btn toggle-filter" id="toggleFilter">≡</button>
    <!-- 篩選面板（書籤式） -->
    <div class="filter-panel" id="filterPanel">
        <div class="filter-title">Tier (常見參考連鎖店)</div>
        <div class="rank-buttons">
            <button class="rank-btn" style="background: #e63946;" data-rank="T0">T0 (Shake Shack)</button>
            <button class="rank-btn" style="background: #f77f00;" data-rank="T1">T1 (Five Guys)</button>
            <button class="rank-btn" style="background: #fcbf49;" data-rank="T2">T2 (Subway)</button>
            <button class="rank-btn" style="background: #e9f542;" data-rank="T3">T3 (貳樓)</button>
            <button class="rank-btn" style="background: #43aa8b;" data-rank="T4">T4 (漢堡王)</button>
            <button class="rank-btn" style="background: #577590;" data-rank="T5">T5 (麥當勞)</button>
            <button class="rank-btn" style="background: #277da1;" data-rank="T6">T6 (摩斯漢堡)</button>
        </div>

        <div class="filter-title">台北市行政區</div>
        <div class="area-buttons">
            <button class="area-btn" data-area="信義區">信義區</button>
            <button class="area-btn" data-area="大安區">大安區</button>
            <button class="area-btn" data-area="松山區">松山區</button>
            <button class="area-btn" data-area="中山區">中山區</button>
            <button class="area-btn" data-area="南港區">南港區</button>
            <button class="area-btn" data-area="內湖區">內湖區</button>
            <button class="area-btn" data-area="士林區">士林區</button>
            <button class="area-btn" data-area="北投區">北投區</button>
            <button class="area-btn" data-area="中正區">中正區</button>
            <button class="area-btn" data-area="萬華區">萬華區</button>
            <button class="area-btn" data-area="大同區">大同區</button>
            <button class="area-btn" data-area="文山區">文山區</button>
        </div>

        <button class="reset-btn" id="resetFilter">重置篩選</button>
    </div>

    <script src="./data.js"></script>
    <script>
        // 初始化地圖
        const map = L.map('map').setView([25.0478, 121.5319], 12);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap contributors &copy; CARTO',
            maxZoom: 18
        }).addTo(map);

        // 等級顏色映射
        const rankColorMap = {
            T0: '#e63946', T1: '#f77f00', T2: '#fcbf49',
            T3: '#e9f542', T4: '#43aa8b', T5: '#577590', T6: '#277da1'
        };

        // 等級中文標語映射
        const rankLabelMap = {
            T0: 'T0 (敲級好吃)',
            T1: 'T1 (滿好吃的)',
            T2: 'T2 (普通好吃)',
            T3: 'T3 (雞肋勘吃)',
            T4: 'T4 (將就果腹)',
            T5: 'T5 (難以吞嚥)',
            T6: 'T6 (犬不爭食)'
        };

        // 全域變數
        let allMarkers = [];
        let currentRank = null;
        let currentArea = null;

        // 初始化所有店家標記
        function initMarkers() {
            if (!burgerData || burgerData.length === 0) {
                // 沒有data.js時，添加默認測試點，確保地圖能看到內容
                const testData = [
                    { name: 'Shake Shack (信義區)', rank: 'T0', area: '信義區', lat: 25.0375, lng: 121.5646, meat: '安格斯牛肉', price: 'NT$180-' },
                    { name: '漢堡王 (大安區)', rank: 'T4', area: '大安區', lat: 25.0458, lng: 121.5219, meat: '牛肉', price: 'NT$99-' },
                    { name: '麥當勞 (中山區)', rank: 'T5', area: '中山區', lat: 25.0602, lng: 121.5139, meat: '牛肉', price: 'NT$79-' }
                ];
                testData.forEach(shop => {
                    const marker = L.circleMarker([shop.lat, shop.lng], {
                        radius: 9,
                        fillColor: rankColorMap[shop.rank] || '#6c757d',
                        color: "#fff",
                        weight: 1,
                        fillOpacity: 0.9
                    });
                    const currentRankLabel = rankLabelMap[shop.rank] || shop.rank;
                    marker.bindTooltip(`${currentRankLabel} - ${shop.name}`, { permanent: false, direction: 'top' });
                    marker.bindPopup(`
                        <div class="popup-title">${shop.name}</div>
                        <div class="popup-info">好吃等級：${currentRankLabel}</div>
                        <div class="popup-info">地區：${shop.area || '台北市'}</div>
                        <div class="popup-info">肉品：${shop.meat || '未標註'}</div>
                        <div class="popup-info">價格：${shop.price || '未標註'}</div>
                    `);
                    marker.shopData = shop;
                    allMarkers.push(marker);
                    marker.addTo(map);
                });
                const bounds = L.latLngBounds(allMarkers.map(m => [m._latlng.lat, m._latlng.lng]));
                map.fitBounds(bounds, { padding: [50, 50] });
                return;
            }
            
            allMarkers = [];
            burgerData.forEach(shop => {
                const lat = shop.lat || 25.0478;
                const lng = shop.lng || 121.5319;
                
                const marker = L.circleMarker([lat, lng], {
                    radius: 9,
                    fillColor: rankColorMap[shop.rank] || '#6c757d',
                    color: "#fff",
                    weight: 1,
                    fillOpacity: 0.9
                });

                // 綁定提示和彈窗
                const currentRankLabel = rankLabelMap[shop.rank] || shop.rank;
                marker.bindTooltip(`${currentRankLabel} - ${shop.name}`, { permanent: false, direction: 'top' });
                marker.bindPopup(`
                    <div class="popup-title">${shop.name}</div>
                    <div class="popup-info">好吃等級：${currentRankLabel}</div>
                    <div class="popup-info">地區：${shop.area || '台北市'}</div>
                    <div class="popup-info">肉品：${shop.meat || '未標註'}</div>
                    <div class="popup-info">價格：${shop.price || '未標註'}</div>
                `);

                marker.shopData = shop;
                allMarkers.push(marker);
                marker.addTo(map);
            });

            // 自動適配地圖視野
            const bounds = L.latLngBounds(allMarkers.map(m => [m._latlng.lat, m._latlng.lng]));
            map.fitBounds(bounds, { padding: [50, 50] });
        }

        // 篩選標記邏輯
        function filterMarkers() {
            allMarkers.forEach(marker => {
                const shop = marker.shopData;
                const rankMatch = !currentRank || shop.rank === currentRank;
                const areaMatch = !currentArea || 
                    (shop.area || '').includes(currentArea.replace('區', '')) ||
                    (currentArea === '大安區' && (shop.area || '') === '東區');
                
                rankMatch && areaMatch ? marker.addTo(map) : map.removeLayer(marker);
            });

            const visibleMarkers = allMarkers.filter(m => map.hasLayer(m));
            if (visibleMarkers.length > 0) {
                const bounds = L.latLngBounds(visibleMarkers.map(m => [m._latlng.lat, m._latlng.lng]));
                map.fitBounds(bounds, { padding: [50, 50] });
            } else {
                map.setView([25.0478, 121.5319], 12);
                alert(`未找到【${currentRank || '所有等級'}】+【${currentArea || '所有行政區'}】的店家！`);
            }
        }

        // 綁定等級按鈕事件
        document.querySelectorAll('.rank-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                currentRank = currentRank === btn.dataset.rank ? null : btn.dataset.rank;
                document.querySelectorAll('.rank-btn').forEach(b => b.classList.remove('active'));
                if (currentRank) btn.classList.add('active');
                filterMarkers();
            });
        });

        // 綁定行政區按鈕事件
        document.querySelectorAll('.area-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                currentArea = currentArea === btn.dataset.area ? null : btn.dataset.area;
                document.querySelectorAll('.area-btn').forEach(b => b.classList.remove('active'));
                if (currentArea) btn.classList.add('active');
                filterMarkers();
            });
        });

        // 重置篩選按鈕
        document.getElementById('resetFilter').addEventListener('click', () => {
            currentRank = null;
            currentArea = null;
            document.querySelectorAll('.rank-btn, .area-btn').forEach(btn => btn.classList.remove('active'));
            allMarkers.forEach(marker => marker.addTo(map));
            const bounds = L.latLngBounds(allMarkers.map(m => [m._latlng.lat, m._latlng.lng]));
            map.fitBounds(bounds, { padding: [50, 50] });
        });

        // 書籤式折疊核心邏輯（所有尺寸都生效）
        document.getElementById('toggleLegend').addEventListener('click', () => {
            document.getElementById('legendPanel').classList.toggle('show');
        });
        document.getElementById('toggleFilter').addEventListener('click', () => {
            document.getElementById('filterPanel').classList.toggle('show');
        });

        // 修復地圖渲染（延遲刷新尺寸）
        setTimeout(() => {
            if (map) map.invalidateSize(true);
        }, 200);

        // 初始化
        initMarkers();
    </script>
</body>
</html>
