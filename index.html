<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>台北市漢堡店家排名地圖 | T0-T6 等級</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Microsoft JhengHei", sans-serif; }
        body { background: #1a1a1a; color: #fff; }
        .header { padding: 12px; text-align: center; background: #2d2d2d; }
        .header h1 { font-size: 18px; margin-bottom: 4px; }
        .header p { font-size: 12px; opacity: 0.8; }
        #map { height: calc(100vh - 80px); width: 100%; }

        /* 共用：折疊按鈕（電腦+手機都用）—— 透明僅框線 */
        .toggle-btn {
            position: fixed;
            background: transparent; /* 完全透明底色 */
            color: #fff; /* 按鈕內文字/圖標白色 */
            border: 2px solid #e63946; /* 僅保留紅色框線 */
            border-radius: 50%;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 99999;
            /* 移除陰影，避免擋地圖 */
            box-shadow: none;
            transition: all 0.2s;
        }
        .toggle-btn:hover {
            background: #e63946; /* hover 時紅色底色 */
            border-color: #fff; /* hover 時白色框線 */
            color: #fff; /* hover 時文字白色 */
        }

        /* --------------------------
           電腦版（≥769px）：雙側折疊面板
        -------------------------- */
        @media (min-width: 769px) {
            /* 圖例面板（左側） */
            .legend {
                position: absolute;
                bottom: 20px;
                left: 20px;
                background: rgba(0,0,0,0.85);
                padding: 10px;
                border-radius: 8px;
                font-size: 12px;
                z-index: 998;
                min-width: 220px;
                transition: all 0.3s ease;
                /* 預設展開 */
                transform: translateX(0);
                opacity: 1;
            }
            /* 電腦版：圖例收起狀態 */
            .legend.collapsed {
                transform: translateX(-110%);
                opacity: 0;
                pointer-events: none;
            }
            /* 電腦版：圖例折疊按鈕 */
            .toggle-legend {
                bottom: 20px;
                left: 20px;
            }

            /* 篩選面板（右側） */
            .filter-panel {
                position: absolute;
                bottom: 20px;
                right: 20px;
                background: rgba(0,0,0,0.85);
                padding: 10px;
                border-radius: 8px;
                font-size: 12px;
                z-index: 999;
                min-width: 280px;
                transition: all 0.3s ease;
                /* 預設展開 */
                transform: translateX(0);
                opacity: 1;
            }
            /* 電腦版：篩選收起狀態 */
            .filter-panel.collapsed {
                transform: translateX(110%);
                opacity: 0;
                pointer-events: none;
            }
            /* 電腦版：篩選折疊按鈕 */
            .toggle-filter {
                bottom: 20px;
                right: 20px;
            }

            /* 電腦版內部樣式（不變） */
            .filter-title { font-size: 14px; font-weight: bold; margin-bottom: 8px; color: #fff; }
            .rank-buttons { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; margin-bottom: 10px; }
            .rank-btn {
                padding: 5px 8px;
                border: none;
                border-radius: 4px;
                cursor: pointer;
                font-size: 12px;
                color: #fff;
                opacity: 0.8;
                transition: all 0.2s;
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
            }
            .rank-btn.active { opacity: 1; transform: scale(1.05); }
            .area-buttons { 
                display: flex; 
                flex-wrap: wrap; 
                gap: 4px; 
                max-height: 120px;
                overflow-y: auto;
                padding-right: 5px;
                margin-bottom: 8px;
            }
            .area-btn {
                padding: 4px 6px;
                border: 1px solid #666;
                background: #333;
                color: #fff;
                border-radius: 4px;
                cursor: pointer;
                font-size: 11px;
                white-space: nowrap;
                transition: all 0.2s;
            }
            .area-btn.active { background: #e63946; border-color: #e63946; }
            .reset-btn {
                width: 100%;
                padding: 6px;
                border: none;
                border-radius: 4px;
                background: #577590;
                color: #fff;
                cursor: pointer;
                font-size: 12px;
            }
            .reset-btn:hover { background: #43aa8b; }
            .legend h4 { margin-bottom: 8px; font-size: 14px; }
            .legend-item { display: flex; align-items: center; margin: 4px 0; }
            .legend-color { width: 12px; height: 12px; margin-right: 6px; border-radius: 50%; }
        }

        /* --------------------------
           手機版（≤768px）：書籤式折疊
        -------------------------- */
        @media (max-width: 768px) {
            /* 篩選面板：頂部滑動 */
            .filter-panel {
                position: absolute;
                top: 80px;
                left: 0;
                right: 0;
                background: rgba(0,0,0,0.9);
                padding: 8px;
                border-radius: 0;
                z-index: 999;
                overflow-x: auto;
                overflow-y: hidden;
                white-space: nowrap;
                transition: transform 0.3s ease;
                /* 預設隱藏 */
                transform: translateY(-100%);
            }
            .filter-panel.show { transform: translateY(0); }

            /* 圖例面板：底部滑動 */
            .legend {
                position: fixed;
                bottom: 60px;
                left: 10px;
                right: 10px;
                background: rgba(0,0,0,0.85);
                padding: 8px;
                border-radius: 8px;
                font-size: 11px;
                z-index: 998;
                transition: transform 0.3s ease;
                /* 預設隱藏 */
                transform: translateY(200%);
            }
            .legend.show { transform: translateY(0); }

            /* 手機版按鈕位置 & 樣式調整 */
            .toggle-filter {
                top: 50%;
                right: 0;
                transform: translateY(-50%);
                border-radius: 10px 0 0 10px; /* 書籤式圓角 */
                width: 40px;
                height: 80px;
                border-radius: 10px 0 0 10px; /* 匹配書籤形狀 */
                border-width: 2px 0 2px 2px; /* 右側無邊框，更像書籤 */
            }
            .toggle-legend {
                bottom: 60px;
                left: 10px;
            }

            /* 手機版內部樣式（不變） */
            .filter-title { font-size: 12px; margin-bottom: 6px; }
            .rank-buttons {
                display: inline-flex;
                gap: 4px;
                margin-bottom: 8px;
                overflow-x: auto;
                padding-bottom: 4px;
            }
            .rank-btn {
                padding: 6px 8px;
                font-size: 11px;
                min-width: auto;
                white-space: nowrap;
                border: none;
                border-radius: 4px;
                color: #fff;
                opacity: 0.8;
                transition: all 0.2s;
            }
            .rank-btn.active { opacity: 1; transform: scale(1.05); }
            .area-buttons {
                display: inline-flex;
                gap: 3px;
                max-height: none;
                overflow-x: auto;
                padding-bottom: 4px;
            }
            .area-btn {
                padding: 4px 6px;
                font-size: 10px;
                white-space: nowrap;
                border: 1px solid #666;
                background: #333;
                color: #fff;
                border-radius: 4px;
                transition: all 0.2s;
            }
            .area-btn.active { background: #e63946; border-color: #e63946; }
            .reset-btn {
                position: fixed;
                bottom: 10px;
                left: 50%;
                transform: translateX(-50%);
                width: 90%;
                padding: 8px;
                font-size: 14px;
                z-index: 1000;
                border: none;
                border-radius: 4px;
                background: #577590;
                color: #fff;
                cursor: pointer;
            }
            .reset-btn:hover { background: #43aa8b; }
            .legend h4 { font-size: 12px; margin-bottom: 6px; }
            .legend-item { display: flex; align-items: center; margin: 3px 0; }
            .legend-color { width: 12px; height: 12px; margin-right: 6px; border-radius: 50%; }
        }

        /* 彈窗樣式（不變） */
        .leaflet-popup-content { color: #333; width: 200px !important; }
        .popup-title { font-weight: bold; font-size: 16px; margin-bottom: 6px; color: #e63946; }
        .popup-info { font-size: 14px; margin: 3px 0; }
    </style>
</head>

            <button class="area-btn" data-area="文山區">文山區</button>
        </div>
        <button class="reset-btn" id="resetFilter">重置篩選</button>
    </div>

    <script src="./data.js"></script>
