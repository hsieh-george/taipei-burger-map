<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>台北市漢堡店家排名地圖 | T0-T6 等級</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Microsoft JhengHei", sans-serif; }
        body { background: #1a1a1a; color: #fff; }
        .header { padding: 15px; text-align: center; background: #2d2d2d; }
        .header h1 { font-size: 20px; margin-bottom: 5px; }
        .header p { font-size: 14px; opacity: 0.8; }
        #map { height: 85vh; width: 100%; position: relative; z-index: 1; }

        /* 折疊按鈕：手機版顯示，電腦版隱藏 */
        .toggle-btn {
            position: fixed;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0,0,0,0.9);
            color: #fff;
            border: 2px solid #fff;
            border-radius: 8px;
            padding: 14px 8px;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            z-index: 99999;
            transition: all 0.3s;
            width: 44px;
            height: 88px;
            display: none; /* 電腦版預設隱藏 */
            align-items: center;
            justify-content: center;
            -webkit-transform: translateZ(0);
            transform: translateZ(0);
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
        }
        .toggle-legend { left: 0; border-radius: 0 8px 8px 0; }
        .toggle-filter { right: 0; border-radius: 8px 0 0 8px; }
        .toggle-btn:hover { background: #e63946; border-color: #e63946; }

        /* 圖例面板：電腦版預設顯示，手機版預設隱藏 */
        .legend {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.85);
            padding: 10px;
            border-radius: 8px;
            font-size: 12px;
            z-index: 998;
            min-width: 220px;
            transition: transform 0.3s ease;
            transform: translateX(0);
        }
        .legend.collapsed { transform: translateX(-120%); }
        .legend h4 { margin-bottom: 8px; font-size: 14px; }
        .legend-item { display: flex; align-items: center; margin: 4px 0; }
        .legend-color { width: 12px; height: 12px; margin-right: 6px; border-radius: 50%; }

        /* 篩選面板：電腦版預設顯示，手機版預設隱藏 */
        .filter-panel {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(0,0,0,0.85);
            padding: 10px;
            border-radius: 8px;
            font-size: 12px;
            z-index: 999;
            min-width: 280px;
            transition: transform 0.3s ease;
            transform: translateX(0);
        }
        .filter-panel.collapsed { transform: translateX(120%); }
        .filter-title { font-size: 14px; font-weight: bold; margin-bottom: 8px; color: #fff; }
        .rank-buttons { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; margin-bottom: 10px; }
        .rank-btn {
            padding: 5px 8px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            color: #fff;
            opacity: 0.8;
            transition: all 0.2s;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .rank-btn.active { opacity: 1; transform: scale(1.05); }
        .area-buttons { 
            display: flex; 
            flex-wrap: wrap; 
            gap: 4px; 
            max-height: 120px;
            overflow-y: auto;
            padding-right: 5px;
            margin-bottom: 8px;
        }
        .area-btn {
            padding: 4px 6px;
            border: 1px solid #666;
            background: #333;
            color: #fff;
            border-radius: 4px;
            cursor: pointer;
            font-size: 11px;
            white-space: nowrap;
            transition: all 0.2s;
        }
        .area-btn.active { background: #e63946; border-color: #e63946; }
        .reset-btn {
            width: 100%;
            padding: 6px;
            border: none;
            border-radius: 4px;
            background: #577590;
            color: #fff;
            cursor: pointer;
            font-size: 12px;
        }
        .reset-btn:hover { background: #43aa8b; }

        /* 彈窗樣式優化 */
        .leaflet-popup-content { color: #333; width: 200px !important; }
        .popup-title { font-weight: bold; font-size: 16px; margin-bottom: 6px; color: #e63946; }
        .popup-info { font-size: 14px; margin: 3px 0; }

        /* 手機版適配：768px以下生效 */
        @media (max-width: 768px) {
            /* 顯示折疊按鈕 */
            .toggle-btn { display: flex; }
            /* 預設隱藏面板 */
            .legend { transform: translateX(-120%); min-width: auto; width: calc(100vw - 20px); max-width: 320px; }
            .filter-panel { transform: translateX(120%); min-width: auto; width: calc(100vw - 20px); max-width: 320px; }
            /* 調整按鈕排版 */
            .rank-buttons { grid-template-columns: repeat(2, 1fr); }
            .area-buttons { max-height: 90px; }
            /* 調整地圖高度 */
            #map { height: calc(100vh - 80px); }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>台北市漢堡店家排名地圖</h1>
        <p>T0(敲級好吃)~T6(犬不爭食) 好吃等級 | 行政區篩選</p>
    </div>
    <div id="map"></div>

    <!-- 左側折疊按鈕（手機版顯示） -->
    <button class="toggle-btn toggle-legend" id="toggleLegend">≡</button>
    <!-- 圖例：左下角 -->
    <div class="legend" id="legendPanel">
        <h4>評級 </h4>
        <div class="legend-item"><div class="legend-color" style="background: #e63946;"></div>T0 (敲級好吃)</div>
        <div class="legend-item"><div class="legend-color" style="background: #f77f00;"></div>T1 (滿好吃的)</div>
        <div class="legend-item"><div class="legend-color" style="background: #fcbf49;"></div>T2 (普通好吃)</div>
        <div class="legend-item"><div class="legend-color" style="background: #e9f542;"></div>T3 (雞肋勘吃)</div>
        <div class="legend-item"><div class="legend-color" style="background: #43aa8b;"></div>T4 (將就果腹)</div>
        <div class="legend-item"><div class="legend-color" style="background: #577590;"></div>T5 (難以吞嚥)</div>
        <div class="legend-item"><div class="legend-color" style="background: #277da1;"></div>T6 (犬不爭食)</div>
    </div>

    <!-- 右側折疊按鈕（手機版顯示） -->
    <button class="toggle-btn toggle-filter" id="toggleFilter">≡</button>
    <!-- 篩選面板：右下角 -->
    <div class="filter-panel" id="filterPanel">
        <div class="filter-title">Tier (常見參考連鎖店)</div>
        <div class="rank-buttons">
            <button class="rank-btn" style="background: #e63946;" data-rank="T0">T0 (Shake Shack)</button>
            <button class="rank-btn" style="background: #f77f00;" data-rank="T1">T1 (Five Guys)</button>
            <button class="rank-btn" style="background: #fcbf49;" data-rank="T2">T2 (Subway)</button>
            <button class="rank-btn" style="background: #e9f542;" data-rank="T3">T3 (貳樓)</button>
            <button class="rank-btn" style="background: #43aa8b;" data-rank="T4">T4 (漢堡王)</button>
            <button class="rank-btn" style="background: #577590;" data-rank="T5">T5 (麥當勞)</button>
            <button class="rank-btn" style="background: #277da1;" data-rank="T6">T6 (摩斯漢堡)</button>
        </div>

        <div class="filter-title">台北市行政區</div>
        <div class="area-buttons">
            <button class="area-btn" data-area="信義區">信義區</button>
            <button class="area-btn" data-area="大安區">大安區</button>
            <button class="area-btn" data-area="松山區">松山區</button>
            <button class="area-btn" data-area="中山區">中山區</button>
            <button class="area-btn" data-area="南港區">南港區</button>
            <button class="area-btn" data-area="內湖區">內湖區</button>
            <button class="area-btn" data-area="士林區">士林區</button>
            <button class="area-btn" data-area="北投區">北投區</button>
            <button class="area-btn" data-area="中正區">中正區</button>
            <button class="area-btn" data-area="萬華區">萬華區</button>
            <button class="area-btn" data-area="大同區">大同區</button>
            <button class="area-btn" data-area="文山區">文山區</button>
        </div>

        <button class="reset-btn" id="resetFilter">重置篩選</button>
    </div>

    <script src="./data.js"></script>
    <script>
        // 初始化地圖
        const map = L.map('map').setView([25.0478, 121.5319], 12);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap contributors &copy; CARTO',
            maxZoom: 18
        }).addTo(map);

        // 等級顏色映射（僅 T0-T6）
        const rankColorMap = {
            T0: '#e63946', T1: '#f77f00', T2: '#fcbf49',
            T3: '#e9f542', T4: '#43aa8b', T5: '#577590', T6: '#277da1'
        };

        // 等級中文標語映射
        const rankLabelMap = {
            T0: 'T0 (敲級好吃)',
            T1: 'T1 (滿好吃的)',
            T2: 'T2 (普通好吃)',
            T3: 'T3 (雞肋勘吃)',
            T4: 'T4 (將就果腹)',
            T5: 'T5 (難以吞嚥)',
            T6: 'T6 (犬不爭食)'
        };

        // 全域變數
        let allMarkers = [];
        let currentRank = null;
        let currentArea = null;

        // 初始化所有店家標記
        function initMarkers() {
            if (!burgerData || burgerData.length === 0) return;
            
            allMarkers = [];
            burgerData.forEach(shop => {
                const lat = shop.lat || 25.0478;
                const lng = shop.lng || 121.5319;
                
                const marker = L.circleMarker([lat, lng], {
                    radius: 9,
                    fillColor: rankColorMap[shop.rank] || '#6c757d',
                    color: "#fff",
                    weight: 1,
                    fillOpacity: 0.9
                });

                // 綁定提示和彈窗（顯示中文標語）
                const currentRankLabel = rankLabelMap[shop.rank] || shop.rank;
                marker.bindTooltip(`${currentRankLabel} - ${shop.name}`, { permanent: false, direction: 'top' });
                marker.bindPopup(`
                    <div class="popup-title">${shop.name}</div>
                    <div class="popup-info">好吃等級：${currentRankLabel}</div>
                    <div class="popup-info">地區：${shop.area || '台北市'}</div>
                    <div class="popup-info">肉品：${shop.meat || '未標註'}</div>
                    <div class="popup-info">價格：${shop.price || '未標註'}</div>
                `);

                marker.shopData = shop;
                allMarkers.push(marker);
                marker.addTo(map);
            });

            // 自動適配地圖視野
            const bounds = L.latLngBounds(allMarkers.map(m => [m._latlng.lat, m._latlng.lng]));
            map.fitBounds(bounds, { padding: [50, 50] });
        }

        // 篩選標記：同時考慮等級和行政區
        function filterMarkers() {
            allMarkers.forEach(marker => {
                const shop = marker.shopData;
                // 等級篩選：無選中則通過，有選中則匹配
                const rankMatch = !currentRank || shop.rank === currentRank;
                // 行政區篩選：無選中則通過，有選中則匹配（兼容「東區」等別名）
                const areaMatch = !currentArea || 
                    (shop.area || '').includes(currentArea.replace('區', '')) ||
                    (currentArea === '大安區' && (shop.area || '') === '東區');
                
                // 同時滿足兩個條件才顯示
                if (rankMatch && areaMatch) {
                    marker.addTo(map);
                } else {
                    map.removeLayer(marker);
                }
            });

            // 篩選後調整視野
            const visibleMarkers = allMarkers.filter(m => map.hasLayer(m));
            if (visibleMarkers.length > 0) {
                const bounds = L.latLngBounds(visibleMarkers.map(m => [m._latlng.lat, m._latlng.lng]));
                map.fitBounds(bounds, { padding: [50, 50] });
            } else {
                map.setView([25.0478, 121.5319], 12);
                alert(`未找到【${currentRank || '所有等級'}】+【${currentArea || '所有行政區'}】的店家！`);
            }
        }

        // 綁定等級按鈕事件
        document.querySelectorAll('.rank-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                // 切換當前等級：再次點擊則取消
                if (currentRank === btn.dataset.rank) {
                    currentRank = null;
                    btn.classList.remove('active');
                } else {
                    // 先取消其他等級按鈕的激活狀態
                    document.querySelectorAll('.rank-btn').forEach(b => b.classList.remove('active'));
                    currentRank = btn.dataset.rank;
                    btn.classList.add('active');
                }
                // 執行聯合篩選
                filterMarkers();
            });
        });

        // 綁定行政區按鈕事件
        document.querySelectorAll('.area-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                // 切換當前行政區：再次點擊則取消
                if (currentArea === btn.dataset.area) {
                    currentArea = null;
                    btn.classList.remove('active');
                } else {
                    // 先取消其他行政區按鈕的激活狀態
                    document.querySelectorAll('.area-btn').forEach(b => b.classList.remove('active'));
                    currentArea = btn.dataset.area;
                    btn.classList.add('active');
                }
                // 執行聯合篩選
                filterMarkers();
            });
        });

        // 重置篩選按鈕
        document.getElementById('resetFilter').addEventListener('click', () => {
            currentRank = null;
            currentArea = null;
            document.querySelectorAll('.rank-btn, .area-btn').forEach(btn => btn.classList.remove('active'));
            allMarkers.forEach(marker => marker.addTo(map));
            const bounds = L.latLngBounds(allMarkers.map(m => [m._latlng.lat, m._latlng.lng]));
            map.fitBounds(bounds, { padding: [50, 50] });
        });

        // 折疊/展開圖例面板（手機版）
        document.getElementById('toggleLegend').addEventListener('click', () => {
            document.getElementById('legendPanel').classList.toggle('collapsed');
        });

        // 折疊/展開篩選面板（手機版）
        document.getElementById('toggleFilter').addEventListener('click', () => {
            document.getElementById('filterPanel').classList.toggle('collapsed');
        });

        // 修復地圖渲染延遲
        setTimeout(() => {
            if (map) map.invalidateSize(true);
        }, 100);

        // 初始化執行
        initMarkers();
    </script>
</body>
</html>
