<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台北市漢堡店家排名地圖 | T0-T6 等級</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        html, body { 
            height: 100%; 
            margin: 0; 
            padding: 0; 
            font-family: "Microsoft JhengHei", sans-serif;
        }
        * { box-sizing: border-box; }
        body { background: #1a1a1a; color: #fff; }

        .header { 
            padding: 10px;
            text-align: center; 
            background: #2d2d2d; 
        }
        .header h1 { font-size: 18px; margin: 0; }
        .header p { font-size: 12px; opacity: 0.8; margin: 2px 0 0 0; }

        #map { 
            height: calc(100vh - 70px);
            width: 100%; 
            z-index: 1;
        }

        /* 按鈕 */
        .toggle-btn, .toggle-legend-btn {
            position: fixed;
            background: #222;
            color: #fff;
            border: 2px solid #e63946;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 9999;
            bottom: 20px;
            font-size: 16px;
        }
        .toggle-btn { right: 20px; }
        .toggle-legend-btn { left: 20px; }
        .toggle-btn:hover, .toggle-legend-btn:hover {
            background: #e63946;
        }

        /* 圖例 */
        .legend {
            position: fixed;
            bottom: 70px;
            left: 20px;
            background: rgba(0,0,0,0.8);
            padding: 10px;
            border-radius: 8px;
            font-size: 14px;
            z-index: 998;
            min-width: 220px;
        }
        .legend h4 { margin: 0 0 8px 0; font-size: 14px; }
        .legend-item {
            display: flex;
            align-items: center;
            margin: 4px 0;
        }
        .legend-color {
            width: 14px;
            height: 14px;
            margin-right: 6px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        /* 篩選面板 */
        .filter-panel {
            position: fixed;
            bottom: 70px;
            right: 20px;
            background: rgba(0,0,0,0.8);
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            z-index: 999;
            min-width: 280px;
        }
        .filter-title { font-weight: bold; margin-bottom: 8px; font-size: 14px; }
        .rank-buttons {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 5px;
            margin-bottom: 10px;
        }
        .rank-btn {
            padding: 5px;
            border: none;
            border-radius: 4px;
            color: #fff;
            cursor: pointer;
            font-size: 12px;
        }
        .area-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            margin-bottom: 10px;
        }
        .area-btn {
            padding: 4px 6px;
            border: 1px solid #666;
            background: #333;
            color: #fff;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }
        .area-btn.active { background: #e63946; border-color: #e63946; }
        .reset-btn {
            width: 100%;
            padding: 6px;
            border: none;
            border-radius: 4px;
            background: #577590;
            color: #fff;
            cursor: pointer;
        }

        /* 手機版（不會壓縮、不會跑版）*/
        @media (max-width: 768px) {
            #map { height: calc(100vh - 60px); }
            .header h1 { font-size: 16px; }
            .header p { font-size: 11px; }

            .filter-panel {
                position: fixed;
                top: 60px;
                left: 0;
                right: 0;
                bottom: unset;
                background: rgba(0,0,0,0.9);
                padding: 8px;
                min-width: unset;
                max-height: 280px;
                overflow-y: auto;
                border-radius: 0;
            }
            .legend {
                position: fixed;
                bottom: 70px;
                left: 10px;
                right: 10px;
                background: rgba(0,0,0,0.9);
                padding: 8px;
                min-width: unset;
                font-size: 13px;
            }
            .legend-color { width: 12px; height: 12px; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>台北市漢堡店家排名地圖</h1>
        <p>T0(敲級好吃)~T6(犬不爭食) 好吃等級 | 行政區篩選</p>
    </div>
    <div id="map"></div>

    <button class="toggle-btn" id="toggleFilterBtn">≡</button>
    <button class="toggle-legend-btn" id="toggleLegendBtn">ℹ️</button>

    <div class="legend" id="legendPanel">
        <h4>好吃等級 (常見連鎖店)</h4>
        <div class="legend-item"><div class="legend-color" style="background: #e63946;"></div>T0 (Shake Shack)</div>
        <div class="legend-item"><div class="legend-color" style="background: #f77f00;"></div>T1 (Five Guys)</div>
        <div class="legend-item"><div class="legend-color" style="background: #fcbf49;"></div>T2 (Subway)</div>
        <div class="legend-item"><div class="legend-color" style="background: #e9f542;"></div>T3 (貳樓)</div>
        <div class="legend-item"><div class="legend-color" style="background: #43aa8b;"></div>T4 (漢堡王)</div>
        <div class="legend-item"><div class="legend-color" style="background: #577590;"></div>T5 (麥當勞)</div>
        <div class="legend-item"><div class="legend-color" style="background: #277da1;"></div>T6 (摩斯漢堡)</div>
    </div>

    <div class="filter-panel" id="filterPanel">
        <div class="filter-title">好吃等級</div>
        <div class="rank-buttons">
            <button class="rank-btn" style="background: #e63946;" data-rank="T0">T0</button>
            <button class="rank-btn" style="background: #f77f00;" data-rank="T1">T1</button>
            <button class="rank-btn" style="background: #fcbf49;" data-rank="T2">T2</button>
            <button class="rank-btn" style="background: #e9f542;" data-rank="T3">T3</button>
            <button class="rank-btn" style="background: #43aa8b;" data-rank="T4">T4</button>
            <button class="rank-btn" style="background: #577590;" data-rank="T5">T5</button>
            <button class="rank-btn" style="background: #277da1;" data-rank="T6">T6</button>
        </div>
        <div class="filter-title">行政區</div>
        <div class="area-buttons">
            <button class="area-btn" data-area="信義區">信義區</button>
            <button class="area-btn" data-area="大安區">大安區</button>
            <button class="area-btn" data-area="松山區">松山區</button>
            <button class="area-btn" data-area="中山區">中山區</button>
            <button class="area-btn" data-area="南港區">南港區</button>
            <button class="area-btn" data-area="內湖區">內湖區</button>
            <button class="area-btn" data-area="士林區">士林區</button>
            <button class="area-btn" data-area="北投區">北投區</button>
            <button class="area-btn" data-area="中正區">中正區</button>
            <button class="area-btn" data-area="萬華區">萬華區</button>
            <button class="area-btn" data-area="大同區">大同區</button>
            <button class="area-btn" data-area="文山區">文山區</button>
        </div>
        <button class="reset-btn" id="resetFilter">重置篩選</button>
    </div>

    <script>
        const map = L.map('map').setView([25.0478, 121.5319], 13);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap & CARTO'
        }).addTo(map);

        const rankColorMap = {
            T0: '#e63946', T1: '#f77f00', T2: '#fcbf49',
            T3: '#e9f542', T4: '#43aa8b', T5: '#577590', T6: '#277da1'
        };

        // 切換面板顯示
        const filterBtn = document.getElementById('toggleFilterBtn');
        const legendBtn = document.getElementById('toggleLegendBtn');
        const filterPanel = document.getElementById('filterPanel');
        const legendPanel = document.getElementById('legendPanel');

        filterBtn.addEventListener('click', () => {
            filterPanel.style.display = filterPanel.style.display === 'none' ? 'block' : 'none';
        });
        legendBtn.addEventListener('click', () => {
            legendPanel.style.display = legendPanel.style.display === 'none' ? 'block' : 'none';
        });
    </script>
</body>
</html>
